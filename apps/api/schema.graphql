"""
GraphQL is used for read-heavy queries that benefit from flexible field
selection and nested data in a single round-trip.
All CRUD operations live in the REST API.
"""

type Book {
  id: ID!
  title: String!
  authors: [String!]!
  genres: [String!]!
  description: String
  isbn: String
  publishedYear: Int
  publisher: String
  language: String
  pageCount: Int
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
}

type AdminStats {
  totalBooks: Int!
  activeBooks: Int!
  inactiveBooks: Int!
}

type Query {
  books(search: String, genre: String, isActive: Boolean): [Book!]!
  book(id: ID!): Book
  adminStats: AdminStats!
}
