"""
GraphQL is used for read-heavy queries that benefit from flexible field
selection and nested data in a single round-trip.
All CRUD operations live in the REST API.
"""

type Book {
  id: ID!
  title: String!
  authors: [String!]!
  genres: [String!]!
  description: String
  isbn: String
  publishedYear: Int
  publisher: String
  language: String
  pageCount: Int
  isActive: Boolean!
  createdAt: String!
  updatedAt: String!
}

type CategoryWithStats {
  id: ID!
  name: String!
  description: String
  isActive: Boolean!
  activeBookCount: Int!
}

type CategoryBookCount {
  categoryId: ID!
  categoryName: String!
  count: Int!
}

type AdminStats {
  totalBooks: Int!
  activeBooks: Int!
  inactiveBooks: Int!
  totalCategories: Int!
  booksByCategory: [CategoryBookCount!]!
}

type UserBook {
  id: ID!
  userId: ID!
  bookId: ID!
  addedAt: String!
}

type Query {
  books(search: String, genre: String, isActive: Boolean): [Book!]!
  book(id: ID!): Book
  myLibrary: [Book!]!
  adminStats: AdminStats!
  categoriesWithStats: [CategoryWithStats!]!
}

type Mutation {
  addToLibrary(bookId: ID!): UserBook
  removeFromLibrary(bookId: ID!): Boolean!
}
